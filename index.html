<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد 🎂</title>

<style>
body {
    margin: 0;
    background: #020617;
    color: white;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
}

/* الصفحة الأولى */
#startPage {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

.startBtn {
    background: #22c55e;
    padding: 15px 30px;
    border-radius: 10px;
    font-size: 1.5em;
    cursor: pointer;
}

/* الصفحة الثانية */
#main {
    display: none;
}

/* الاسم */
.name {
    font-size: 2.5em;
    color: #22c55e;
    text-shadow: 0 0 20px #22c55e;
    direction: rtl;
}

/* الشموع */
.candles {
    margin-top: 20px;
}

/* النص */
.message {
    font-size: 1.6em;
    margin-top: 20px;
    line-height: 1.8;
    direction: rtl;
    color: #e2e8f0;
}

/* التهنئة */
.from {
    margin-top: 15px;
    font-size: 1.2em;
    color: #94a3b8;
}

/* confetti */
.confetti {
    position: fixed;
    width: 6px;
    height: 12px;
    top: -10px;
    opacity: 0.8;
    animation: fall linear infinite;
}
@keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); }
}

/* balloons */
.balloon {
    position: fixed;
    bottom: -100px;
    width: 50px;
    height: 70px;
    border-radius: 50%;
    animation: float 12s linear infinite;
}
@keyframes float {
    to {transform: translateY(-130vh);}
}

/* candles */
.candle {
    width: 10px;
    height: 40px;
    background: white;
    margin: 3px;
    display: inline-block;
    position: relative;
}
.flame {
    width: 10px;
    height: 15px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -15px;
}
</style>
</head>

<body>

<!-- الصوت -->
<audio id="music">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- الصفحة الأولى -->
<div id="startPage">
    <h1>🎁 عيد ميلاد سعيد </h1>
    <div class="startBtn" onclick="start()">اضغط للمفاجأة 🎉</div>
</div>

<!-- الصفحة الثانية -->
<div id="main">
    <h1>🎂 Happy Birthday 🎂</h1>

    <div class="name">دكتورنا أبو بشير</div>

    <div id="candles" class="candles"></div>

    <p class="message">
        🎉 كل عام وأنت بخير يا دكتورنا<br>
        نشوفك في أعلى المراتب<br>
        ملك البيس 👑
    </p>

    <p class="from">💙 تهنئة من مجموعة الغوالي</p>
</div>

<script>

function start(){
    document.getElementById("startPage").style.display = "none";
    document.getElementById("main").style.display = "block";

    let audio = document.getElementById("music");
    audio.play().catch(()=>{});

    confetti();
    balloons();
    candles();
}

// confetti
function confetti(){
    for(let i=0;i<120;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=["#ff4d4d","#ffd93d","#4dff88","#4da6ff"][Math.floor(Math.random()*4)];
        c.style.animationDuration=(3+Math.random()*3)+"s";
        document.body.appendChild(c);
    }
}

// balloons
function balloons(){
    for(let i=0;i<12;i++){
        let b=document.createElement("div");
        b.className="balloon";
        b.style.left=Math.random()*100+"vw";
        b.style.background=["red","yellow","green","blue","pink"][Math.floor(Math.random()*5)];
        b.style.animationDuration=(8+Math.random()*5)+"s";
        document.body.appendChild(b);
    }
}

// candles
function candles(){
    let container = document.getElementById("candles");

    for(let i=0;i<9;i++){
        let c = document.createElement("div");
        c.className = "candle";

        let f = document.createElement("div");
        f.className = "flame";

        c.appendChild(f);
        container.appendChild(c);
    }
}

</script>

</body>
</html>
